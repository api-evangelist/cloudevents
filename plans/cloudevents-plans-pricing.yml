specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: CloudEvents
providerId: cloudevents
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Cloud Native
  - Events
  - Specification
  - CNCF
  - Open Source
notes: CloudEvents is a CNCF Graduated open-source specification, not a commercial product. There are
  no plans, no per-call pricing, and no rate-limited APIs — only the spec, SDKs, and protocol bindings.
  The plan entry below is a single 'open-source' plan to preserve the API Commons Plans structure.
description: CloudEvents is a free, open-source CNCF Graduated specification for describing event data
  in a common way. There are no commercial plans, license fees, or paid tiers. Commercial event-management
  platforms (Amazon EventBridge, Azure Event Grid, Google Cloud Eventarc, etc.) implement CloudEvents but
  are billed under their own pricing — see those providers' artifacts.
sources:
  - https://cloudevents.io/
  - https://github.com/cloudevents/spec
plans:
  - id: cloudevents-open-source
    name: Open Source Specification
    type: freemium
    description: Free CNCF Graduated specification distributed under Apache-2.0. SDKs available for Go,
      JavaScript, Java, C#, Ruby, PHP, Python, Rust, and PowerShell.
    entries:
      - label: Specification access
        name: spec
        type: quota
        metric: download
        limit: -1
        timeFrame: usage
        geo: global
        unit: 1
        price: '0.00'
        userMultiplied: false
      - label: SDK usage
        name: sdks
        type: quota
        metric: download
        limit: -1
        timeFrame: usage
        geo: global
        unit: 1
        price: '0.00'
        userMultiplied: false
    elements:
      - name: HTTP, AMQP, Kafka, MQTT, NATS protocol bindings
      - name: Multi-language SDKs (Go, JavaScript, Java, C#, Ruby, PHP, Python, Rust, PowerShell)
      - name: CNCF Graduated governance
      - name: Apache-2.0 license
maintainers:
