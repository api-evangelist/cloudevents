meters:
  - name: not_applicable
    description: CloudEvents has no billable meters. Track consumption on the implementing platform (EventBridge,
      Event Grid, Eventarc, NATS, Kafka, etc.).
    unit: varies
    aggregation: sum
principles:
  - name: Visibility
    description: Observe CloudEvents traffic on the implementing platform's billing and metering surface;
      CloudEvents itself produces no spend.
  - name: Allocation
    description: Tag the implementing platform's resources (event buses, subscriptions, brokers) to teams
      consuming or producing CloudEvents.
  - name: Optimization
    description: Right-size payload sizes and event fan-out on the implementing platform; CloudEvents structure
      itself is overhead-light by design.
  - name: Accountability
    description: Ownership flows to the team operating the implementing event platform, not CloudEvents
      itself.
