notes: CloudEvents is a free CNCF Graduated specification. There is no invoice, no usage meter, no commercial
  surface to allocate. The shape below preserves the FinOps Framework structure but flags the artifact
  as informational only — the meaningful FinOps surface is on the platforms that implement CloudEvents
  (EventBridge, Event Grid, Eventarc, etc.).
description: CloudEvents itself is a free, open-source CNCF specification with no commercial cost surface.
  FinOps observation should focus on the platforms that emit or receive CloudEvents.
