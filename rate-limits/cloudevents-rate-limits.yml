specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: CloudEvents
providerId: cloudevents
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Cloud Native
  - Events
  - Specification
  - CNCF
notes: CloudEvents is an open-source specification, not an API service. There are no rate limits because
  there is no hosted endpoint. Rate limits are enforced by the platforms that implement CloudEvents (Amazon
  EventBridge, Azure Event Grid, Google Cloud Eventarc, Knative Eventing, etc.) — refer to those providers'
  rate-limit documentation.
description: CloudEvents itself is a specification with no hosted API; there is nothing to rate-limit.
  Implementing platforms enforce their own rate limits.
sources:
  - https://cloudevents.io/
  - https://github.com/cloudevents/spec
responseCodes: {}
limits:
  - name: Not applicable — specification only
    scope: account
    metric: varies
    limit: not applicable
    notes: CloudEvents has no hosted API. Consult the rate-limit docs of the implementing platform (EventBridge,
      Event Grid, Eventarc, etc.).
policies:
  - name: Implementer-defined
    description: Rate limits are defined and enforced by the platforms that emit or receive CloudEvents,
      not by the CloudEvents specification itself.
