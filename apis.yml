    tags:
      - Client Library
      - Java
      - SDK
  - aid: cloudevents:cloudevents-sdk-python
    name: CloudEvents Python SDK
    description: >-
      The official Python SDK for CloudEvents provides libraries for producing
      and consuming CloudEvents in Python applications. It supports HTTP
      transport bindings and both structured and binary content modes.
    humanURL: https://github.com/cloudevents/sdk-python
    image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
